style = default

maxColumn = 100

version = 3.10.7

// Vertical alignment is pretty, but leads to bigger diffs
align.preset = none

// This just looks better
newlines.implicitParamListModifierPrefer = before

rewrite.rules = [
  AvoidInfix
  RedundantBraces
  RedundantParens
  AsciiSortImports
  PreferCurlyFors
]

project.excludeFilters = [
  "scalafix-inputs",
  "scalafix-outputs"
]

runner.dialect = scala213

fileOverride {
  "glob:**/*.sbt" {
    rewrite.trailingCommas.style = always
  }
}
