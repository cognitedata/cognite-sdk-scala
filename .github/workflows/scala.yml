name: Scala CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  compile_scala_213:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    environment: CI

    timeout-minutes: 20

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
      - run: |
          git rev-list --count --first-parent HEAD > patch_version.txt

      - name: Set up JDK 17
        uses: coursier/setup-action@7acb5c9ea69bc1a1bb185ec45ebce2ac114f3628 # v2.0.3
        with:
          jvm: temurin:17
          apps: sbt

      # Caching dependencies in Pull Requests based on branch name and build.sbt.
      # Can we do something better here?
      - name: Cache Coursier dependencies
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5
        env:
          cache-name: coursier-cache
        with:
          path: ~/.cache/coursier/v1
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ github.head_ref }}-${{ hashFiles('**/build.sbt') }}

      - name: Compile
        run: |
          cat /dev/null | sbt -Dsbt.log.noformat=true ++2.13 dependencyLockCheck
          cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx2G -J-XX:+UseG1GC ++2.13 Test/compile

  compile_scala_3:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    environment: CI

    timeout-minutes: 20

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
      - run: |
          git rev-list --count --first-parent HEAD > patch_version.txt

      - name: Set up JDK 17
        uses: coursier/setup-action@7acb5c9ea69bc1a1bb185ec45ebce2ac114f3628 # v2.0.3
        with:
          jvm: temurin:17
          apps: sbt

      # Caching dependencies in Pull Requests based on branch name and build.sbt.
      # Can we do something better here?
      - name: Cache Coursier dependencies
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5
        env:
          cache-name: coursier-cache
        with:
          path: ~/.cache/coursier/v1
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ github.head_ref }}-${{ hashFiles('**/build.sbt') }}

      - name: Compile
        run: |
          cat /dev/null | sbt -Dsbt.log.noformat=true ++3.3 dependencyLockCheck
          cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx4G -J-XX:+UseG1GC ++3.3 Test/compile

  test:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/master' && 'CD' || 'CI' }}

    timeout-minutes: 60

    permissions:
      pull-requests: write

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      with:
        fetch-depth: 0
    - run: |
        git rev-list --count --first-parent HEAD > patch_version.txt

    - name: Set up JDK 17
      uses: coursier/setup-action@7acb5c9ea69bc1a1bb185ec45ebce2ac114f3628 # v2.0.3
      with:
        jvm: temurin:17
        apps: sbt

    # Caching dependencies in Pull Requests based on branch name and build.sbt.
    # Can we do something better here?
    - name: Cache Coursier dependencies
      uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5
      env:
        cache-name: coursier-cache
      with:
        path: ~/.cache/coursier/v1
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ github.head_ref }}-${{ hashFiles('**/build.sbt') }}

    - name: Run tests for Scala 2.13
      env:
        COGNITE_BASE_URL: "https://bluefield.cognitedata.com"
        TEST_AAD_TENANT: "b86328db-09aa-4f0e-9a03-0136f604d20a"
        TEST_CLIENT_ID: ${{ secrets.BLUEFIELD_CLIENT_ID }}
        TEST_CLIENT_SECRET: ${{ secrets.BLUEFIELD_CLIENT_SECRET }}
        TEST_PROJECT: "extractor-bluefield-testing"
        COGNITE_BASE_URL2: "https://api.cognitedata.com"
        TEST_AAD_TENANT2: "b86328db-09aa-4f0e-9a03-0136f604d20a"
        TEST_CLIENT_ID2: ${{ secrets.BLUEFIELD_CLIENT_ID }}
        TEST_CLIENT_SECRET2: ${{ secrets.BLUEFIELD_CLIENT_SECRET }}
        TEST_PROJECT2: "playground"
      # run: sbt test
      run: |
        cat /dev/null | sbt -Dsbt.log.noformat=true ++2.13 dependencyLockCheck
        cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx2G -J-XX:+UseG1GC ++2.13 scalafmtCheck scalafmtSbtCheck coverage test coverageReport

    - name: Run tests for Scala 3
      env:
        COGNITE_BASE_URL: "https://bluefield.cognitedata.com"
        TEST_AAD_TENANT: "b86328db-09aa-4f0e-9a03-0136f604d20a"
        TEST_CLIENT_ID: ${{ secrets.BLUEFIELD_CLIENT_ID }}
        TEST_CLIENT_SECRET: ${{ secrets.BLUEFIELD_CLIENT_SECRET }}
        TEST_PROJECT: "extractor-bluefield-testing"
        COGNITE_BASE_URL2: "https://api.cognitedata.com"
        TEST_AAD_TENANT2: "b86328db-09aa-4f0e-9a03-0136f604d20a"
        TEST_CLIENT_ID2: ${{ secrets.BLUEFIELD_CLIENT_ID }}
        TEST_CLIENT_SECRET2: ${{ secrets.BLUEFIELD_CLIENT_SECRET }}
        TEST_PROJECT2: "playground"
      # run: sbt test
      run: |
        cat /dev/null | sbt -Dsbt.log.noformat=true ++3.3 dependencyLockCheck
        cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx4G -J-XX:+UseG1GC ++3.3 scalafmtCheck scalafmtSbtCheck test

    - name: Upload test coverage report
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
      with:
        token: ${{ secrets.codecov_token }}

    - name: Comment PR with top 3 slowest test suites
      if: github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        python3 << 'EOF'
        import glob, xml.etree.ElementTree as ET, subprocess

        results = []
        for f in glob.glob('target/test-reports/*.xml'):
            try:
                root = ET.parse(f).getroot()
                name = root.get('name', f)
                time = float(root.get('time', 0))
                results.append((name, time))
            except Exception:
                pass

        results.sort(key=lambda x: -x[1])
        top3 = results[:3]

        lines = ['## Top 3 slowest test suites', '', '| # | Suite | Time |', '|---|-------|------|']
        for i, (name, time) in enumerate(top3, 1):
            lines.append(f'| {i} | `{name}` | {time:.1f}s |')

        body = '\n'.join(lines)
        subprocess.run(
            ['gh', 'pr', 'comment', '${{ github.event.pull_request.number }}',
             '--body', body, '--repo', '${{ github.repository }}'],
            check=True
        )
        EOF

  publish_jfrog:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    environment: CD

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
      - run: |
          git rev-list --count --first-parent HEAD > patch_version.txt

      - name: Set up JDK 17
        uses: coursier/setup-action@7acb5c9ea69bc1a1bb185ec45ebce2ac114f3628 # v2.0.3
        with:
          jvm: temurin:17
          apps: sbt

      - name: Build JAR file
        run: |
          cat /dev/null | sbt -Dsbt.log.noformat=true +dependencyLockCheck
          cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx3G -J-XX:+UseG1GC "set Test/test := {}" "set compile/skip := true" +package

      - name: Install GPG & Sonatype credentials for SBT
        env:
          GPG_PUBLIC_KEY: ${{ secrets.SONATYPE_CENTRAL_PORTAL_GPG_PUBLIC_KEY }}
          GPG_PRIVATE_KEY: ${{ secrets.SONATYPE_CENTRAL_PORTAL_GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SONATYPE_CENTRAL_PORTAL_GPG_KEY_PASSPHRASE }}
        run: |
          set -x

          echo "$GPG_PUBLIC_KEY" > public.key
          gpg --import public.key
          echo "$GPG_PRIVATE_KEY" > private.key
          gpg --verbose --batch --import-options import-show --import private.key
          
          mkdir -p ~/.sbt/gpg
          echo "$GPG_PRIVATE_KEY_PASSPHRASE" | gpg --verbose --batch -a --export-secret-keys --pinentry-mode loopback --passphrase-fd 0 > ~/.sbt/gpg/secring.asc

      - name: Publish package
        env:
          GPG_KEY_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PORTAL_GPG_KEY_PASSPHRASE }}
          JFROG_USERNAME: ${{ secrets.ARTIFACTORY_PUBLISH_TOKEN_USER }}
          JFROG_PASSWORD: ${{ secrets.ARTIFACTORY_PUBLISH_TOKEN }}
          PUBLISH_TO_JFROG: "true"
        run: |
          sbt -Dsbt.log.noformat=true -J-Xmx3G -J-XX:+UseG1GC +publishSigned
  publish_sonatype:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    environment: CD

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0
      - run: |
          git rev-list --count --first-parent HEAD > patch_version.txt

      - name: Set up JDK 17
        uses: coursier/setup-action@7acb5c9ea69bc1a1bb185ec45ebce2ac114f3628 # v2.0.3
        with:
          jvm: temurin:17
          apps: sbt

      - name: Build JAR file
        run: |
          cat /dev/null | sbt -Dsbt.log.noformat=true +dependencyLockCheck
          cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx3G -J-XX:+UseG1GC "set Test/test := {}" "set compile/skip := true" +package

      - name: Install GPG & Sonatype credentials for SBT
        env:
          GPG_PUBLIC_KEY: ${{ secrets.SONATYPE_CENTRAL_PORTAL_GPG_PUBLIC_KEY }}
          GPG_PRIVATE_KEY: ${{ secrets.SONATYPE_CENTRAL_PORTAL_GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SONATYPE_CENTRAL_PORTAL_GPG_KEY_PASSPHRASE }}
        run: |
          set -x

          echo "$GPG_PUBLIC_KEY" > public.key
          gpg --import public.key
          echo "$GPG_PRIVATE_KEY" > private.key
          gpg --verbose --batch --import-options import-show --import private.key
          
          mkdir -p ~/.sbt/gpg
          echo "$GPG_PRIVATE_KEY_PASSPHRASE" | gpg --verbose --batch -a --export-secret-keys --pinentry-mode loopback --passphrase-fd 0 > ~/.sbt/gpg/secring.asc

      - name: Publish package
        env:
          GPG_KEY_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PORTAL_GPG_KEY_PASSPHRASE }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_CENTRAL_PORTAL_USER }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PORTAL_PASSWORD }}
        run: |
          sbt -Dsbt.log.noformat=true -J-Xmx3G -J-XX:+UseG1GC +publishSigned sonaRelease
