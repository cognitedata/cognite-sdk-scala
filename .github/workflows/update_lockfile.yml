name: Update lockfile

on:
  pull_request:
    types: [labeled,opened,reopened,synchronize]
    branches: [ master ]

jobs:
  update_lockfile:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'auto-lockfile-update')
    environment: CI

    timeout-minutes: 20

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        name: Checkout repository
        with:
          ref: ${{ github.head_ref }}

      - name: Set up JDK 17
        uses: coursier/setup-action@7acb5c9ea69bc1a1bb185ec45ebce2ac114f3628 # v2.0.3
        with:
          jvm: temurin:17
          apps: sbt

      - name: Update lock
        run: sbt -Dsbt.log.noformat=true +dependencyLockWrite

      - name: Set dummy timestamp in lockfiles
        run: |
          for f in build.*.sbt.lock; do
            sed -i"" 's/"timestamp" : ".*"/"timestamp" : "1970-01-01T00:00:00.000000000Z"/' "$f"
          done

      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10
        with:
          add: 'build.*.sbt.lock'
          message: 'Update lockfiles'
          author_name: 'github-actions'
