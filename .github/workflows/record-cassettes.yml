name: Record VCR Cassettes

# Triggered when a PR receives the 'record-cassettes' label.
# Runs tests in RECORD mode, commits any new/updated cassette files back to the PR branch.
on:
  pull_request:
    types: [labeled]

jobs:
  record:
    if: github.event.label.name == 'record-cassettes'
    runs-on: ubuntu-latest
    environment: CI

    timeout-minutes: 60

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - run: |
          git rev-list --count --first-parent HEAD > patch_version.txt

      - name: Set up JDK 17
        uses: coursier/setup-action@039f736548afa5411c1382f40a5bd9c2d30e0383 # v1.3.9
        with:
          jvm: temurin:17
          apps: sbt

      - name: Cache Coursier dependencies
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5
        env:
          cache-name: coursier-cache
        with:
          path: ~/.cache/coursier/v1
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ github.head_ref }}-${{ hashFiles('**/build.sbt') }}

      - name: Cache Ivy 2 cache
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5
        env:
          cache-name: sbt-ivy2-cache
        with:
          path: ~/.ivy2/cache
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ github.head_ref }}-${{ hashFiles('**/build.sbt') }}

      - name: Record cassettes (Scala 2.13)
        env:
          VCR_MODE: RECORD
          COGNITE_BASE_URL2: "https://api.cognitedata.com"
          TEST_AAD_TENANT2: "b86328db-09aa-4f0e-9a03-0136f604d20a"
          TEST_CLIENT_ID2: ${{ secrets.BLUEFIELD_CLIENT_ID }}
          TEST_CLIENT_SECRET2: ${{ secrets.BLUEFIELD_CLIENT_SECRET }}
          TEST_PROJECT2: "playground"
        run: |
          cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx2G -J-XX:+UseG1GC \
            "++2.13 test"

      - uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9
        with:
          add: 'src/test/resources/cassettes/'
          message: 'chore: record VCR cassettes [skip ci]'
          author_name: 'github-actions'
