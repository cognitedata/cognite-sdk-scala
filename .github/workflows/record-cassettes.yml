name: Record VCR Cassettes

# Triggered when a PR receives the 'record-cassettes' label.
# Plays back existing cassettes; re-records on failure, then commits any new/updated files.
on:
  pull_request:
    types: [ labeled,opened,reopened,synchronize ]
    branches: [ master ]

jobs:
  record:
    if: contains(github.event.pull_request.labels.*.name, 'record-cassettes')
    runs-on: ubuntu-latest
    environment: CI

    timeout-minutes: 60

    env:
      COGNITE_BASE_URL: "https://bluefield.cognitedata.com"
      TEST_AAD_TENANT: "b86328db-09aa-4f0e-9a03-0136f604d20a"
      TEST_CLIENT_ID: ${{ secrets.BLUEFIELD_CLIENT_ID }}
      TEST_CLIENT_SECRET: ${{ secrets.BLUEFIELD_CLIENT_SECRET }}
      TEST_PROJECT: "extractor-bluefield-testing"
      COGNITE_BASE_URL2: "https://api.cognitedata.com"
      TEST_AAD_TENANT2: "b86328db-09aa-4f0e-9a03-0136f604d20a"
      TEST_CLIENT_ID2: ${{ secrets.BLUEFIELD_CLIENT_ID }}
      TEST_CLIENT_SECRET2: ${{ secrets.BLUEFIELD_CLIENT_SECRET }}
      TEST_PROJECT2: "playground"

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - run: |
          git rev-list --count --first-parent HEAD > patch_version.txt

      - name: Set up JDK 17
        uses: coursier/setup-action@fd1707a76b027efdfb66ca79318b4d29b72e5a02 # v3.0.0
        with:
          jvm: temurin:17
          apps: sbt

      - name: Cache Coursier dependencies
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5
        env:
          cache-name: coursier-cache
        with:
          path: ~/.cache/coursier/v1
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ github.head_ref }}-${{ hashFiles('**/build.sbt') }}

      - name: Run tests in AUTO mode (playback existing cassettes, record missing ones)
        id: auto_run
        continue-on-error: true
        env:
          VCR_MODE: AUTO
        run: |
          cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx2G -J-XX:+UseG1GC \
            "++2.13 testOnly * -- -n com.cognite.sdk.scala.VcrTest"

      - name: Re-record cassettes (playback failed)
        if: steps.auto_run.outcome == 'failure'
        env:
          VCR_MODE: RECORD
        run: |
          cat /dev/null | sbt -Dsbt.log.noformat=true -J-Xmx2G -J-XX:+UseG1GC \
            "++2.13 testOnly * -- -n com.cognite.sdk.scala.VcrTest"

      - uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9
        with:
          add: 'src/test/resources/cassettes/'
          message: 'chore: record VCR cassettes'
          author_name: 'github-actions'
